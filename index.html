<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="description"
        content="Story Forge.AI — Transform stories into cinematic worlds."
    >

    <title>Story Forge.AI</title>

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/welcome.css">
</head>

<body>

    <!-- =====================================================
         CINEMATIC WELCOME SCENE
    ====================================================== -->

    <main class="welcome-scene">

        <!-- Background atmosphere -->
        <div class="background-layer"></div>

        <div class="fog fog-one"></div>
        <div class="fog fog-two"></div>

        <div class="light-ray light-ray-one"></div>
        <div class="light-ray light-ray-two"></div>


        <!-- =================================================
             WELCOME TITLE
        ================================================== -->

        <section
            class="welcome-title"
            id="welcomeTitle"
        >

            <p class="small-title">
                THE FUTURE OF STORYTELLING
            </p>

            <h1>
                Welcome to
                <span>Story Forge.AI</span>
            </h1>

            <p class="title-description">
                Where stories become worlds.
            </p>

        </section>


        <!-- =================================================
             CINEMATIC CHARACTER
        ================================================== -->

        <section
            class="rider-scene"
            id="riderScene"
        >

            <!-- Rider -->
            <div
                class="rider"
                id="rider"
            >

                <div class="rider-shadow"></div>

                <!-- Head -->
                <div class="rider-head">

                    <div class="hair"></div>

                    <div class="face">

                        <div class="eye eye-left"></div>
                        <div class="eye eye-right"></div>

                        <div class="nose"></div>

                        <div class="mouth"></div>

                    </div>

                </div>


                <!-- Neck -->
                <div class="neck"></div>


                <!-- Body -->
                <div class="rider-body">

                    <div class="jacket-detail"></div>

                </div>


                <!-- Left arm -->
                <div class="arm arm-left">
                    <div class="hand"></div>
                </div>


                <!-- Right arm -->
                <div class="arm arm-right">
                    <div class="hand"></div>
                </div>


                <!-- Legs -->
                <div class="leg leg-left">
                    <div class="shoe"></div>
                </div>

                <div class="leg leg-right">
                    <div class="shoe"></div>
                </div>


                <!-- Waving hand -->
                <div
                    class="wave-hand"
                    id="waveHand"
                ></div>

            </div>


            <!-- =================================================
                 FUTURISTIC BIKE
            ================================================== -->

            <div
                class="tech-bike"
                id="techBike"
            >

                <!-- Main frame -->
                <div class="bike-frame"></div>

                <div class="bike-core"></div>

                <!-- Front wheel -->
                <div class="bike-wheel bike-wheel-front">

                    <div class="wheel-ring"></div>
                    <div class="wheel-energy"></div>

                </div>


                <!-- Rear wheel -->
                <div class="bike-wheel bike-wheel-back">

                    <div class="wheel-ring"></div>
                    <div class="wheel-energy"></div>

                </div>


                <!-- Front handle -->
                <div class="bike-handle"></div>

                <!-- Seat -->
                <div class="bike-seat"></div>

                <!-- Technology lights -->
                <div class="bike-light bike-light-front"></div>
                <div class="bike-light bike-light-back"></div>

                <div class="bike-energy-line"></div>

            </div>

        </section>


        <!-- =================================================
             ENTER THE FORGE BUTTON
        ================================================== -->

        <button
            class="forge-button"
            id="forgeButton"
        >

            <span class="fang fang-left"></span>

            <span class="button-text">
                ENTER THE FORGE
            </span>

            <span class="fang fang-right"></span>

        </button>


        <!-- =================================================
             SCENE STATUS
        ================================================== -->

        <div
            class="scene-status"
            id="sceneStatus"
        >
            Approaching the Forge...
        </div>


        <!-- =================================================
             SKIP INTRO
        ================================================== -->

        <button
            class="skip-button"
            id="skipButton"
        >
            SKIP INTRO
        </button>

    </main>


    <script src="js/welcome.js"></script>

</body>
      </html>
